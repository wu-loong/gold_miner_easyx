name: Build Windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: >
          msbuild gold_miner_easyx.sln
          /t:Build
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=x64
          /m

      - name: Smoke test and capture screenshot
        if: success() && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          $exePath = Join-Path $PWD "dist\Release\gold_miner_easyx.exe"
          if (-not (Test-Path $exePath)) {
            throw "Executable not found: $exePath"
          }

          $process = Start-Process -FilePath $exePath -WorkingDirectory $PWD -PassThru

          try {
            Start-Sleep -Seconds 5

            if ($process.HasExited) {
              throw "Smoke test failed: process exited early with code $($process.ExitCode)"
            }

            Add-Type -AssemblyName System.Windows.Forms
            Add-Type -AssemblyName System.Drawing

            $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
            $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
            $bitmap.Save((Join-Path $PWD "smoke\screenshot.png"), [System.Drawing.Imaging.ImageFormat]::Png)
            $graphics.Dispose()
            $bitmap.Dispose()
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gold_miner_easyx-${{ matrix.configuration }}-x64
          path: |
            dist/${{ matrix.configuration }}/
            data/levels.txt
            smoke/
            highscore.txt
